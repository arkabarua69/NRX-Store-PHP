[package]
name = "nrx-store"
version = "1.0.0"
description = "NRX Store - Digital Game Top-Up Platform"
authors = ["arkabarua69"]
license = "MIT"
repository = "https://github.com/arkabarua69/NRX-Store-PHP"

[build]
command = "curl -fsSL https://deb.nodesource.com/setup_20.x | bash - && apt-get install -y nodejs && curl -sS https://getcomposer.org/installer | php -- --install-dir=/usr/local/bin --filename=composer && mkdir -p /app/data && touch /app/data/database.sqlite && cd core && composer install --no-dev --optimize-autoloader && npm install && npm run build"

[deploy]
memory = 512
cpu = 1

[[command]]
name = "php-server"
module = "php/php"
args = ["-S", "0.0.0.0:8080", "router.php"]
